  <circle cx="930" cy="135" r="230" fill="#3b82f6" opacity=".18" filter="url(#glow)"/>
  <circle cx="210" cy="470" r="190" fill="#2dd4bf" opacity=".11" filter="url(#glow)"/>
  <path fill="none" stroke="#3b82f6" stroke-opacity=".35" d="M740 110a210 210 0 1 0 0 420 210 210 0 0 0 0-420Z"/>
